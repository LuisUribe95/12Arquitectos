name: Deploy a HostGator
on:
  push:
    branches:
      - main  # Se activa al subir cambios a la rama main

jobs:
  web-deploy:
    name: 🚀 Deploy Website
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
    
    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # Si tu web va en la raíz, deja public_html/
        # Si va en una carpeta, pon public_html/carpeta/
        server-dir: ./public_html/